name: Manual Release

# ─────────────────────────────────────────────────────────────────────────────
# Triggered exclusively from the GitHub Actions UI (Actions → Manual Release →
# Run workflow).  No automatic tag or push trigger.
#
# Required repository secrets:
#   KEYSTORE_BASE64      – base64-encoded .jks / .keystore file
#   KEYSTORE_PASSWORD    – keystore store password
#   KEY_ALIAS            – key alias inside the keystore
#   KEY_PASSWORD         – key password
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version name (e.g. 1.2.0)"
        required: true
        type: string
      build_number:
        description: "Build number (integer, e.g. 42)"
        required: true
        type: string
      release_notes:
        description: "Release notes (optional)"
        required: false
        type: string
        default: ""
      prerelease:
        description: "Mark as pre-release?"
        required: false
        type: boolean
        default: false

# ─────────────────────────────────────────────────────────────────────────────
# Jobs run in this order:
#   test  ──┬──▶  build-android  ──┐
#            └──▶  build-web      ──┴──▶  release
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── 1. Tests ───────────────────────────────────────────────────────────────
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

  # ── 2a. Android APK + AAB ──────────────────────────────────────────────────
  build-android:
    name: Build Android (APK + AAB)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode \
            > android/app/release.keystore

      - name: Build APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build apk --release \
            --build-name="${{ inputs.version }}" \
            --build-number="${{ inputs.build_number }}"

      - name: Build AAB
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build appbundle --release \
            --build-name="${{ inputs.version }}" \
            --build-number="${{ inputs.build_number }}"

      - name: Stage artifacts
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
             dist/teamup-${{ inputs.version }}.apk
          cp build/app/outputs/bundle/release/app-release.aab \
             dist/teamup-${{ inputs.version }}.aab

      - uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: dist/
          retention-days: 7

  # ── 2b. Web ────────────────────────────────────────────────────────────────
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: |
          flutter build web --release \
            --build-name="${{ inputs.version }}" \
            --build-number="${{ inputs.build_number }}"

      - name: Zip web output
        run: |
          cd build/web
          zip -r ../../teamup-web-${{ inputs.version }}.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: web-artifact
          path: teamup-web-${{ inputs.version }}.zip
          retention-days: 7

  # ── 3. GitHub Release ──────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-web]
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: "TeamUp v${{ inputs.version }}"
          body: ${{ inputs.release_notes }}
          prerelease: ${{ inputs.prerelease }}
          files: |
            artifacts/teamup-${{ inputs.version }}.apk
            artifacts/teamup-${{ inputs.version }}.aab
            artifacts/teamup-web-${{ inputs.version }}.zip
