name: Manual Release

# ─────────────────────────────────────────────────────────────────────────────
# Triggered exclusively from the GitHub Actions UI (Actions → Manual Release →
# Run workflow).  No automatic tag or push trigger.
#
# Required repository secrets:
#   Android
#     KEYSTORE_BASE64               – base64-encoded .jks / .keystore file
#     KEYSTORE_PASSWORD             – keystore store password
#     KEY_ALIAS                     – key alias inside the keystore
#     KEY_PASSWORD                  – key password
#   iOS  (requires ios/ directory committed – run `flutter create --platforms ios .` once)
#     IOS_CERTIFICATE_BASE64        – base64-encoded .p12 distribution certificate
#     IOS_CERTIFICATE_PASSWORD      – .p12 password
#     IOS_PROVISIONING_PROFILE_BASE64 – base64-encoded .mobileprovision file
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version name (e.g. 1.2.0)"
        required: true
        type: string
      build_number:
        description: "Build number (integer, e.g. 42)"
        required: true
        type: string
      release_notes:
        description: "Release notes (optional)"
        required: false
        type: string
        default: ""
      prerelease:
        description: "Mark as pre-release?"
        required: false
        type: boolean
        default: false

# ─────────────────────────────────────────────────────────────────────────────
# Jobs run in this order:
#   test  ──┬──▶  build-android  ──┐
#            ├──▶  build-ios      ──┤──▶  release
#            └──▶  build-web      ──┘
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── 1. Tests ───────────────────────────────────────────────────────────────
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

  # ── 2a. Android APK + AAB ──────────────────────────────────────────────────
  build-android:
    name: Build Android (APK + AAB)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode \
            > android/app/release.keystore

      - name: Build APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build apk --release \
            --build-name="${{ inputs.version }}" \
            --build-number="${{ inputs.build_number }}"

      - name: Build AAB
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build appbundle --release \
            --build-name="${{ inputs.version }}" \
            --build-number="${{ inputs.build_number }}"

      - name: Stage artifacts
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
             dist/teamup-${{ inputs.version }}.apk
          cp build/app/outputs/bundle/release/app-release.aab \
             dist/teamup-${{ inputs.version }}.aab

      - uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: dist/
          retention-days: 7

  # ── 2b. Web ────────────────────────────────────────────────────────────────
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: |
          flutter build web --release \
            --build-name="${{ inputs.version }}" \
            --build-number="${{ inputs.build_number }}"

      - name: Zip web output
        run: |
          cd build/web
          zip -r ../../teamup-web-${{ inputs.version }}.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: web-artifact
          path: teamup-web-${{ inputs.version }}.zip
          retention-days: 7

  # ── 2c. iOS IPA ────────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS (IPA)
    runs-on: macos-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Import the distribution certificate into a temporary keychain so
      # Xcode can sign the build without user interaction.
      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          echo "$CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      # Install the provisioning profile so Xcode picks it up automatically.
      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "$PROFILE_BASE64" | base64 --decode > "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build IPA
        run: |
          flutter build ipa --release \
            --build-name="${{ inputs.version }}" \
            --build-number="${{ inputs.build_number }}"

      - name: Stage artifact
        run: |
          mkdir -p dist
          cp build/ios/ipa/*.ipa dist/teamup-${{ inputs.version }}.ipa

      - uses: actions/upload-artifact@v4
        with:
          name: ios-artifact
          path: dist/teamup-${{ inputs.version }}.ipa
          retention-days: 7

  # ── 3. GitHub Release ──────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-ios, build-web]
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: "TeamUp v${{ inputs.version }}"
          body: ${{ inputs.release_notes }}
          prerelease: ${{ inputs.prerelease }}
          files: |
            artifacts/teamup-${{ inputs.version }}.apk
            artifacts/teamup-${{ inputs.version }}.aab
            artifacts/teamup-${{ inputs.version }}.ipa
            artifacts/teamup-web-${{ inputs.version }}.zip
